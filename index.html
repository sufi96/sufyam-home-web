<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SufYam Home — Web</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">🏠</span>
        <span class="brand-text">SufYam Home</span>
      </div>
      <nav id="nav"></nav>
      <div class="sidebar-foot">
        <div id="account" class="account"></div>
        <button id="btn-settings" class="btn btn-ghost btn-block">Settings</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="btn-menu" class="btn btn-ghost btn-icon only-mobile" aria-label="Menu">☰</button>
        <h1 id="page-title">Dashboard</h1>
        <div class="topbar-actions">
          <span id="sync-status" class="sync-status"></span>
          <button id="btn-refresh" class="btn btn-ghost btn-icon" title="Reload from Google Sheets">⟳</button>
          <button id="btn-theme" class="btn btn-ghost btn-icon" title="Toggle theme">◐</button>
        </div>
      </header>

      <div id="banner" class="banner hidden"></div>
      <section id="view" class="view"></section>
    </main>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root"></div>

  <!--
    Classic (non-module) script: this still runs under file://, where the ES
    module below is blocked by CORS. Without it, opening index.html directly
    just shows an empty shell and a console error.
  -->
  <script>
    if (location.protocol === 'file:') {
      document.getElementById('view').innerHTML =
        '<div class="center-pane"><div class="card">' +
        '<h2>Needs a local server</h2>' +
        '<p>This page was opened directly from disk (<code>file://</code>). ' +
        'Browsers block JavaScript modules and Google sign-in on <code>file://</code> URLs, ' +
        'so the app has to be served over http.</p>' +
        '<p style="color:var(--text)"><strong>Double-click <code>start-server.bat</code></strong> ' +
        'in this folder, then open <a href="http://localhost:8000" style="color:var(--accent)">' +
        'http://localhost:8000</a>.</p>' +
        '<p>Or from a terminal in this folder:</p>' +
        '<pre style="background:var(--surface-2);padding:12px;border-radius:8px;overflow-x:auto">' +
        'python -m http.server 8000</pre>' +
        '</div></div>';
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
